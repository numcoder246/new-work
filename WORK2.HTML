<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nursing Students New</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #F9F9F9;
      margin: 0;
      padding: 0;
      color: #0A192F;
    }
    header {
      text-align: center;
      padding: 40px;
      background: linear-gradient(90deg, #0A192F, #FFD700);
      color: white;
    }
    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #FFD700;
    }
    h1 {
      font-family: 'Poppins', sans-serif;
      margin: 15px 0 5px;
    }
    .stats {
      font-size: 16px;
      color: #FFD700;
    }
    .bio, .links {
      text-align: center;
      margin: 20px;
    }
    .links a {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      border: 2px solid #FFD700;
      border-radius: 25px;
      text-decoration: none;
      color: #0A192F;
      font-weight: bold;
      transition: 0.3s;
    }
    .links a:hover {
      background-color: #FFD700;
      color: white;
    }
    .posts {
      padding: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .grid img {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .grid img:hover {
      transform: scale(1.05);
    }
    footer {
      text-align: center;
      padding: 20px;
      background: linear-gradient(90deg, #FFD700, #0A192F);
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <img src="pp.jpg" alt="Profile Picture" class="profile-img">
    <h1>@nursing_students_new</h1>
    <p class="stats">Posts: 4797 | Followers: 619K | Following: 397</p>
  </header>

  <section class="bio">
    <p>🎬 Reel Creator</p>
    <p>📍 Jaipur (Rajasthan)</p>
    <p>🚀 NORCET Journey with me</p>
    <p>💼 DM for Paid Collab & PR</p>
  </section>

  <section class="links">

    <a href="https://instagram.com/nursing_students_new">Instagram</a>
  </section>

  <footer>
    <p>&copy; 2026 Nursing Students New</p>
  </footer>
</body>
</html>
